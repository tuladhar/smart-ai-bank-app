# Local end-to-end test of Smart AI Bank.
#
#   docker compose up --build -d
#   docker compose exec backend npm run migration   # seed the database
#   open http://localhost:3000
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartaibank
      POSTGRES_USER: bankuser
      POSTGRES_PASSWORD: bankpass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bankuser -d smartaibank']
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      # On OpenShift these come from a Secret — see the README.
      DB_HOST: db
      DB_PORT: '5432'
      DB_NAME: smartaibank
      DB_USER: bankuser
      DB_PASSWORD: bankpass
    ports:
      - '4000:4000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      # How the frontend discovers the backend. On OpenShift this points at
      # the backend Service, e.g. http://backend:4000
      BACKEND_API_URL: http://backend:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
